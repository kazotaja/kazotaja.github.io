<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taavi Peterson & Üdi</title>
  <link rel="stylesheet" href="style_content.css">
  <style>
    .image-padding {
      padding-top: 40px;
      padding-bottom: 40px;
    }

    .video-embed {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      border-radius: 10px;
      display: block;
      background: rgba(255,255,255,0.02);
    }
  </style>
</head>
<body>
  <div class="media-grid">
    <div class="image-padding">
      <img src="images/taavi/taavi_header_white.png" alt="Taavi Peterson & Üdi header" loading="lazy" decoding="async">
    </div>

    <img src="images/taavi/taavi_2.jpg" alt="Project image 2" loading="lazy" decoding="async">
    <img src="images/taavi/taavi_3.jpg" alt="Project image 3" loading="lazy" decoding="async">
    <img src="images/taavi/taavi_4.jpg" alt="Project image 4" loading="lazy" decoding="async">

    <iframe
      class="video-embed"
      src="https://www.youtube-nocookie.com/embed/7gajMsRq9TI?si=d-bSnvkCAYO0T0vt"
      title="Taavi Peterson & Üdi video"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
      loading="lazy">
    </iframe>
  </div>
</body>
</html>
