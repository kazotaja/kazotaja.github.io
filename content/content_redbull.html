<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Bull</title>

<link rel="stylesheet" href="style_content.css">

<style>

/* two videos side by side */
.video-row{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
padding:20px;
}

/* responsive videos, no cropping */
.video-row video{
width:100%;
height:auto;
aspect-ratio:9 / 16;
object-fit:contain;
border-radius:10px;
background:rgba(255,255,255,0.02);
}

@media (max-width:700px){
.video-row{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<div class="video-row">

<video autoplay loop muted playsinline>
<source src="videos/rb/RedBull_Frat_1080x1920px_vertical_clean3---.mp4" type="video/mp4">
</video>

<video autoplay loop muted playsinline>
<source src="videos/rb/RedBull_Vyrts_11080x1920px_vertical_clean 3_4--.mp4" type="video/mp4">
</video>

</div>

</body>
</html>
